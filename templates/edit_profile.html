{% extends "layout.html" %}
{% block title %}Edit profile · RunLog{% endblock %}

{% block content %}

<div class="mb-6 fade-up">
  <h1 class="text-xl font-medium">Edit profile</h1>
  <p class="text-muted text-sm mt-0.5">Update your physical data</p>
</div>

<form action="/profile/edit" method="post">
  <!-- CSRF protection token -->
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="bg-card border border-border rounded-xl2 p-4 mb-4 fade-up fade-up-1 space-y-4">

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs text-muted mb-1.5" for="age">Age</label>
        <input id="age" name="age" type="number" min="10" max="99"
          class="input-field" value="{{ user.age or '' }}" />
      </div>
      <div>
        <label class="block text-xs text-muted mb-1.5" for="sex">Biological sex</label>
        <select id="sex" name="sex" class="input-field">
          <option value="">—</option>
          <option value="M" {% if user.sex == 'M' %}selected{% endif %}>Male</option>
          <option value="F" {% if user.sex == 'F' %}selected{% endif %}>Female</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-muted mb-1.5" for="weight_kg">Weight (kg)</label>
        <input id="weight_kg" name="weight_kg" type="number" step="0.1" min="30" max="200"
          class="input-field" value="{{ user.weight_kg or '' }}" />
      </div>
      <div>
        <label class="block text-xs text-muted mb-1.5" for="height_cm">Height (cm)</label>
        <input id="height_cm" name="height_cm" type="number" min="100" max="230"
          class="input-field" value="{{ user.height_cm or '' }}" />
      </div>
    </div>

    <div class="border-t border-border pt-4 space-y-3">
      <p class="text-xs text-muted uppercase tracking-wider">Heart rate</p>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs text-muted mb-1.5" for="hr_max">Max HR (bpm)</label>
          <input id="hr_max" name="hr_max" type="number" min="100" max="220"
            class="input-field" value="{{ user.hr_max or '' }}" />
        </div>
        <div>
          <label class="block text-xs text-muted mb-1.5" for="hr_rest">Resting HR (bpm)</label>
          <input id="hr_rest" name="hr_rest" type="number" min="30" max="100"
            class="input-field" value="{{ user.hr_rest or '' }}" />
        </div>
      </div>
    </div>

    <div class="border-t border-border pt-4 space-y-3">
      <div>
        <label class="block text-xs text-muted mb-1.5" for="location">Training location</label>
        <input id="location" name="location" type="text"
          class="input-field" value="{{ user.location or '' }}"
          placeholder="E.g. Central Park, NYC" />
      </div>
      <div>
        <label class="block text-xs text-muted mb-1.5" for="goal_km">Goal distance (km)</label>
        <input id="goal_km" name="goal_km" type="number" min="1" max="200"
          class="input-field" value="{{ user.goal_km or 21 }}" />
      </div>
    </div>

  </div>

  <div class="flex gap-3">
    <a href="/profile" class="btn-secondary flex-1 text-center">Cancel</a>
    <button type="submit" class="btn-primary flex-1">Save changes</button>
  </div>

</form>

{% endblock %}
